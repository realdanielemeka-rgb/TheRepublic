name: cPanel API

# Bridge for calling the cPanel UAPI from environments that cannot reach
# port 2083 directly. Dispatch with one or more endpoints (semicolon-
# separated); each JSON response is printed in the job log.
#
# Requires repository Actions secrets:
#   CPANEL_USER      - cPanel account username
#   CPANEL_API_TOKEN - API token from cPanel > Manage API Tokens
#   CPANEL_HOST      - server hostname, e.g. server220.web-hosting.com

on:
  workflow_dispatch:
    inputs:
      endpoint:
        description: "UAPI call(s), semicolon-separated, e.g. Quota/get_quota_info;Email/list_pops?skip_main=1"
        required: true
        type: string

jobs:
  call:
    runs-on: ubuntu-latest
    steps:
      - name: Call cPanel UAPI
        env:
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          ENDPOINT: ${{ inputs.endpoint }}
        run: |
          if [ -z "$CPANEL_USER" ] || [ -z "$CPANEL_API_TOKEN" ] || [ -z "$CPANEL_HOST" ]; then
            echo "::error::Missing CPANEL_USER / CPANEL_API_TOKEN / CPANEL_HOST repository secrets."
            exit 1
          fi
          IFS=';' read -ra CALLS <<< "$ENDPOINT"
          for c in "${CALLS[@]}"; do
            echo "===== ${c} ====="
            curl -sS --fail-with-body --max-time 60 \
              -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_API_TOKEN}" \
              "https://${CPANEL_HOST}:2083/execute/${c}" | python3 -m json.tool || echo "(call failed)"
          done
